name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-qa-app:
    name: Build Q&A 答题 APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev openjdk-17-jdk-headless autoconf automake libtool zip unzip cmake git wget libssl-dev libffi-dev libltdl-dev

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython virtualenv buildozer

      - name: Diagnostics
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== Java ==="
          java -version
          echo "=== Buildozer location ==="
          which buildozer || find / -name "buildozer" -type f 2>/dev/null | head -5
          echo "=== pip show buildozer ==="
          pip show buildozer
          echo "=== PATH ==="
          echo $PATH
          echo "=== Python path ==="
          python3 -c "import buildozer; print(buildozer.__file__)"

      - name: Build APK
        working-directory: qa_app
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Q&A答题-APK
          path: qa_app/bin/*.apk

  build-qa-adder:
    name: Build Q&A 添加题目 APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev openjdk-17-jdk-headless autoconf automake libtool zip unzip cmake git wget libssl-dev libffi-dev libltdl-dev

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython virtualenv buildozer

      - name: Diagnostics
        run: |
          echo "=== Python ==="
          python3 --version
          echo "=== Java ==="
          java -version
          echo "=== Buildozer location ==="
          which buildozer || find / -name "buildozer" -type f 2>/dev/null | head -5
          echo "=== pip show buildozer ==="
          pip show buildozer
          echo "=== PATH ==="
          echo $PATH

      - name: Build APK
        working-directory: qa_adder
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Q&A添加题目-APK
          path: qa_adder/bin/*.apk
