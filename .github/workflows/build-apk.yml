name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-qa-app:
    name: Build Q&A 答题 APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip openjdk-17-jdk-headless

      - name: Setup Android SDK environment
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        working-directory: qa_app
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q&A答题-APK
          path: qa_app/bin/*.apk

  build-qa-adder:
    name: Build Q&A 添加题目 APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip openjdk-17-jdk-headless

      - name: Setup Android SDK environment
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        working-directory: qa_adder
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q&A添加题目-APK
          path: qa_adder/bin/*.apk
