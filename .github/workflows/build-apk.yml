name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-qa-app:
    name: Build Q&A 答题 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev openjdk-17-jdk-headless autoconf automake libtool zip unzip libssl-dev libffi-dev libltdl-dev

      - name: Install Buildozer
        run: pip install cython buildozer

      - name: Build APK
        working-directory: qa_app
        run: buildozer android debug

      - name: Copy APK out
        run: |
          echo "=== buildozer dists ==="
          find .buildozer/android/platform -name "*.apk" -type f 2>/dev/null
          echo "=== gradle outputs ==="
          find .buildozer -path "*/build/outputs/apk/*.apk" 2>/dev/null
          echo "=== copying to output/ ==="
          mkdir -p output
          find . -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null
          find /tmp -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null
          find /home -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null
          echo "=== output contents ==="
          ls -la output/ 2>/dev/null || echo "output dir empty"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q&A答题-APK
          path: output/*.apk

  build-qa-adder:
    name: Build Q&A 添加题目 APK
    runs-on: ubuntu-22.04
