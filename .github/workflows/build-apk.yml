name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-qa-app:
    name: Build Q&A 答题 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Buildozer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev openjdk-17-jdk-headless autoconf automake libtool zip unzip libssl-dev libffi-dev libltdl-dev
          pip install cython buildozer

      - name: Build APK
        working-directory: qa_app
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: buildozer android debug

      - name: Copy APK out
        run: |
          mkdir -p output
          find . -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null
          ls -la output/ || echo "output empty"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q&A答题-APK
          path: output/*.apk

  build-qa-adder:
    name: Build Q&A 添加题目 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Buildozer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev openjdk-17-jdk-headless autoconf automake libtool zip unzip libssl-dev libffi-dev libltdl-dev
          pip install cython buildozer

      - name: Build APK
        working-directory: qa_adder
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: buildozer android debug

      - name: Copy APK out
        run: |
          mkdir -p output
          find . -name "*.apk" -type f -exec cp -v {} output/ \; 2>/dev/null
          ls -la output/ || echo "output empty"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Q&A添加题目-APK
          path: output/*.apk
